<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selmecbánya látnivalók – térkép</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --bg:#161616;
      --panel:rgba(0,0,0,0.70);
      --panel2:rgba(0,0,0,0.55);
      --text:#f2f2f2;
      --muted:rgba(255,255,255,0.80);
      --accent:#ffb000;
      --border:rgba(255,255,255,0.14);
      --ok:#3bd16f;
      --blue:#2d7ff9;
      --red:#ff5a5a;

      --dockH: 36vh;   /* nyitott fül magassága */
      --handleH: 54px; /* fül fogantyú */
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Georgia, "Times New Roman", serif;
      overflow:hidden;
    }

    #map{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
    }

    .topbar{
      position:fixed;
      left:10px;
      right:10px;
      top:10px;
      z-index:1000;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      pointer-events:none;
    }

    .topbar .left,
    .topbar .right{
      display:flex;
      gap:8px;
      align-items:center;
      pointer-events:auto;
    }

    .chip{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 12px;
      font-size:14px;
      color:var(--text);
      backdrop-filter: blur(6px);
      box-shadow:0 8px 22px rgba(0,0,0,0.35);
      max-width:72vw;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      cursor:pointer;
      box-shadow:0 8px 22px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      user-select:none;
    }
    .btn:active{ transform:scale(0.99); }

    .map-dock{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:1100;

      transform: translateY(calc(var(--dockH) - var(--handleH)));
      transition: transform 220ms ease;
      will-change: transform;
    }
    .map-dock.open{
      transform: translateY(0);
    }

    .map-dock-handle{
      height:var(--handleH);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;

      background:var(--panel);
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
      backdrop-filter: blur(8px);

      cursor:default; /* fontos: ne a teljes sáv legyen kattintható */
    }

    .map-dock-title{
      font-size:15px;
      color:var(--text);
      font-weight:700;
      letter-spacing:0.2px;
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .map-dock-title .small{
      font-weight:400;
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:58vw;
    }

    .map-dock-btn{
      width:44px;
      height:34px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      cursor:pointer;
      font-size:16px;

      pointer-events:auto;
      touch-action: manipulation;
    }
    .map-dock-btn:active{ transform:scale(0.99); }

    .dock-body{
      height:calc(var(--dockH) - var(--handleH));
      background:var(--panel2);
      backdrop-filter: blur(8px);
      border-top:0;
      overflow:auto;
      padding:10px 10px 14px 10px;
    }

    .poi-list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .poi-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;

      padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(0,0,0,0.35);
      cursor:pointer;
      user-select:none;
    }
    .poi-item:active{ transform:scale(0.995); }

    .poi-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .badge{
      width:30px;
      height:30px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:14px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(0,0,0,0.35);
      flex:0 0 auto;
    }

    .poi-name{
      font-size:14px;
      color:var(--text);
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:68vw;
    }

    .poi-item.selected{
      outline:2px solid rgba(45,127,249,0.65);
      border-color: rgba(45,127,249,0.45);
      background: rgba(45,127,249,0.12);
    }

    @media (max-width: 520px){
      :root{ --dockH: 30vh; }
      .poi-name{ max-width:62vw; }
      .chip{ font-size:13px; }
      .btn{ padding:9px 11px; }
    }

    .leaflet-popup-content{
      margin:10px 12px;
      font-family: Georgia, "Times New Roman", serif;
      color:#111;
    }
    .pop-title{
      font-weight:800;
      margin:0 0 6px 0;
      font-size:15px;
    }
    .pop-desc{
      margin:0;
      font-size:13px;
      line-height:1.45;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="topbar">
  <div class="left">
    <div class="chip" id="statusChip">GPS: várakozás</div>
  </div>
  <div class="right">
    <button class="btn" id="btnMyPos" type="button">📍 Saját helyem</button>
  </div>
</div>

<div class="map-dock open" id="mapDock">
  <div class="map-dock-handle" id="mapDockHandle">
    <div class="map-dock-title">
      🗺️ Selmecbánya látnivalók
      <span class="small" id="dockHint">koppints egy pontra a listában</span>
    </div>
    <button class="map-dock-btn" id="mapDockToggle" type="button" aria-expanded="true">▼</button>
  </div>

  <div class="dock-body">
    <div class="poi-list" id="poiList"></div>
  </div>
</div>

<script>
"use strict";

const POIS = [
  { name: "Bányamúzeum", lat: 48.45167429331126, lon: 18.888022005558017, desc: "" },

  { name: "Óvár Starý Zámok", lat: 48.45953070525097, lon: 18.891363766572848, desc:
`Román bazilikából hatszögletű erődítmény

Az UNESCO Világörökség része, Selmecbánya az egykori magyar királyság legjelentősebb bányavárosa volt, egyik fő látványossága és városképének meghatározó eleme a főtértől nem messze, egy magaslaton fekvő Óvár. Az eredetileg román stílusú bazilikaként épült templom az évszázadok során számos átalakuláson ment keresztül, a gótika, a reneszánsz és a barokk is nyomot hagyott rajta, de a legfőbb változás a török veszedelem idején történt, mikor az erődített templomot várrá alakították át. Napjainkban a Szlovák Bányászati Múzeum érdekes, változatos kiállításai, évszázadokon átívelő építészete és a tornyából nyíló páratlan panorámája révén elsőrangú turisztikai látványosság.

A vár története

Az Óvár alapjainak számító templom építését háromhajós román stílusú bazilikaként a templomosok kezdték meg a város közepén magasodó meredek dombon a XIII. században. A Szűz Mária-plébániatemplomot a következő században védfallal kerítették, később bástyával és kaputoronnyal is bővült. A XVI. század elején gótikus köntöst öltött, majd néhány évtized múlva (1546-1559) a török veszély ellenében megerősítik, várrá alakítják át. A templom mennyezetét lebontották a főhajóból várudvart, a szentélyből várkápolnát, az oldalhajókból kaszárnyaszobákat és raktárakat alakítottak ki. A templomtorony őrtorony lett, a főfalak sarkaira kerek bástyákat emeltek.

A török idők után megér még átalakításokat, a torony ekkor kapja máig látható jellegzetes, hagymakupolás barokk sisakját. A XIX. században igazi multifunkciós épületként működött, volt itt levéltár, jégverem, raktár, tornaterem, könyvtár és a városi rendőrség is használta az épületet. 1900-tól múzeum, folyamatosan bővülő kiállításokkal.` },

  { name: "Újvár, vagyis Leányvár Novy Zámok", lat: 48.45581448479778, lon: 18.89592915773392, desc:
`Havas Boldogasszony-templom

A monda szerint Rössel Borbála építtette, mert nem akarta látni az ezen a helyen lévő városi akasztófát. Tehette, mert igen gazdag volt.

A valóság azonban az, hogy a vár a török veszély idején, 1564 és 1571 között épült. A várost 24 olasz ágyúval védte a Léva és Bakabánya irányából várható támadásoktól. Ha ellenséges csapatokat láttak, akkor fekete lobogót tűztek ki. Ha viszont vendég közeledett, az őrség úgynevezett monettát fúvott.

Ma az épületben a törökellenes harcokra emlékező kiállítás látható.
A vár emeletéről a város teljes panorámája látható.` },

  { name: "Kálvária", lat: 48.46166274822716, lon: 18.908905495657308, desc:
`Kálváriákat a középkorban Európa szerte építettek, Jézus szenvedéseit felelevenítendő.
A Selmecbányán található kálváriát a város keleti oldalán emelkedő Scharfenberg-, vagy Kálváriahegy város felé néző oldalára építették a jezsuiták. Három templom és sok apró kápolna alkotja. A felső templomot német, a középsőt magyar, az alsót szlovák templomnak is hívták.

A selmecbányai kálvária különlegessége, hogy a klasszikus 12 stáció helyett csak 7 mutatja Krisztus szenvedéseit, a másik 7 Mária szenvedéseit foglalja össze.` },

  { name: "Szerelem bank", lat: 48.45917631746342, lon: 18.893011919083833, desc: "" },
  { name: "Holtel Barcadam", lat: 48.46017410747623, lon: 18.892027579436885, desc: "" },

  { name: "Tajch Velká Vodárenská tó 15 perc gyalog a Szentháromság térről", lat: 48.46687144459995, lon: 18.88865161687114, desc:
`A Tajch Velká Vodárenská habár egy parányi bányató, ám Szlovákia egyik legszebb tava. A tó gyönyörű kékes-zölden csillogó vize és a körülötte elterülő erdő a kirándulók és fürdőzni vágyók egyik kedvenc pontja. A tó eredetileg bányató volt, és létezéséről már 16. századi leletek is tanúskodnak.` },

  { name: "Szitnya vár Hrad Sitno", lat: 48.40142941692598, lon: 18.88681190693367, desc:
`Szitnya vára (Hrad Sitno) a Selmeci-hegység legmagasabb csúcsán található, 1009 méter magasan. A várat a 13. században építették egy őskori vár-erődítmény helyén. A 18. század elejétől romokban hever.

A Szitnyához több monda és legenda fűződik. Talán a legismertebb arról szól, hogy méhében szitnyai lovagok rejtőznek. Amikor a Szitnya alatt lakók sorsa a legrosszabbra fordul, a hegycsúcs megnyílik és a lovagok megmentik őket.` },

  { name: "Bacsófalvi tó", lat: 48.4079546060909, lon: 18.854320049285892, desc:
`A Bacsófalvi-tó a legszebb és leglátogatottabb bányatavak közé tartozik. A tó partjaitól 1,5 óra alatt fel lehet jutni a legendás Szitnyóra. A tó partján lehet fürdeni, csónakázni, enni és szállást is lehet kapni.

A tajchy rendszer (mesterséges víztározók) a Selmecbánya régió vízgazdálkodási csúcsteljesítménye volt.` },

  { name: "Régi Mindenszentek bánya Bana Starovšechsvätých", lat: 48.45377060672682, lon: 18.786824941635135, desc: "" },

  { name: "Selmecbányai Botanikus kert", lat: 48.460291, lon: 18.900524, desc:
`A Selmecbányai Botanikus kert a történelmi Selmecbánya egyik különleges helyszíne, amely szorosan kapcsolódik a Magyar Királyság bányászati felsőoktatásához. A kert a 18. század végén jött létre, a selmecbányai Bányászati és Erdészeti Akadémia oktatási céljait szolgálva.

A botanikus kert nem reprezentatív parkként született, hanem funkcionális oktatási térként. Feladata az volt, hogy a bányászat és kohászat számára fontos növényfajokat, az erdőgazdálkodás alapjait, valamint a talaj- és vízmegkötés szempontjából lényeges fafajokat élőben mutassa be.` },

  { name: "Belházy-ház", lat: 48.458399527301154, lon: 18.89094360172749, desc:
`A kémiai labor épülete volt a XVIII-XIX. sz.-ban (1770-től). Kémiai és kohászati oktatás folyt a falai között. Az épület kapcsán illik megemlíteni Nicolaus Jacquin és Giovanni Antonio Scopoli nevét.` },

  { name: "Rubigall-ház", lat: 48.459451503204846, lon: 18.892359485868898, desc:
`1538-ban épült gótikus stílusú épület. Selmecbányán az egyik legjelentősebb ringbürger család a Rubigall volt. Jelmondatuk: Spe et patientia, Reménnyel és kitartással.

A házhoz történeti anekdoták is kötődnek Balassi Bálint kapcsán.` },

  { name: "Evangélikus Líceum", lat: 48.46067130299584, lon: 18.892141878604892, desc:
`A Szentháromság tér felső végén, a jobb oldalon található; 1827-1830 között klasszicista stílusban épült kétemeletes épület. Falai közt tanult többek között Petőfi Sándor és Mikszáth Kálmán is. Petőfiről emléktábla található a falán.` },

  { name: "Berggericht (bányabíróság) vagy Hellenbach ház", lat: 48.4595796845444, lon: 18.89279901981354, desc:
`A bányabíróság, a Berggericht mára barokkosított, de a 15. században épített épület. 1792-1854 között a Bányabíróság, azaz a bányászat legmagasabb instanciája székelt itt.

Ma termeiben hatalmas kőzet- és ásványgyűjtemény látható, udvaráról nyílik a patkó alakú, 76 m hosszú Mihály táró, amely látogatható.` },

  { name: "Evangélikus templom", lat: 48.458540489882054, lon: 18.892898261547092, desc:
`1794-1796 között építette a selmecbányai Sivák F. építészmester, Tallher bécsi mérnök tervei alapján. Torony nélküli templom, amely egybeépült az utca épületeivel.` },

  { name: "Selmecbányai Városháza", lat: 48.458810097491856, lon: 18.89262880423087, desc:
`A korábban egyemeletes épület mai alakját 1787-88-ban nyerte. Nevezetessége az óra, melynek mutatói fordítva jelzik az idő múlását: a kismutató jelzi a perceket, a nagy pedig az órákat.` },

  { name: "Szűz Mária v. Immaculata szoboregyüttes", lat: 48.45888585872504, lon: 18.892313539981846, desc:
`Franz Rössner kőfaragó és szobrászmester műve 1748-ból. Tetején Szűz Mária szobra áll, akit angyalok lengenek körül.` },

  { name: "Klopacska (kopogó, lármafa, die Klopf)", lat: 48.45777017785092, lon: 18.892272241892492, desc:
`Az 1681-ben, reneszánsz és barokk stílusban készült épületből évszázadokon át hívták a bányászokat munkába. A kopogtatás hajnalban jelezte a műszak kezdetét. Jelenleg teaház működik az épületben.` },

  { name: "Hegybányai-kapu (vagy Szélaknai-, Piargi-kapu)", lat: 48.45551868851429, lon: 18.893223865048295, desc:
`A kapu a török veszedelem elhárítására 1554-ben, reneszánsz stílusban épült. A homlokzati fülkében Szent Flórián szobra látható.` },

  { name: "Krecsmáry-ház", lat: 48.45861715157205, lon: 18.89398455619812, desc:
`N. J. Jacquin 1764-ben ebben az épületben kezdte meg vegytani és ásványtani előadásait. A Krecsmáry-ház tekinthető az Akadémia legelső épületének.` },

  { name: "Terasz", lat: 48.45861939359901, lon: 18.894515633583072, desc:
`A város korzója, a Főutca egyik oldalán fut végig. Nevét onnan kapta, hogy átlagosan másfél méterrel az út fölé magasodik.` },

  { name: "Kammerhof múzeum", lat: 48.458106, lon: 18.895681, desc:
`A Kammerhof múzeum a Magyar Királyság és a Habsburg Monarchia egyik legfontosabb bányászati és közigazgatási központjának működését mutatja be. A Kammerhof eredetileg a felső-magyarországi bányakamara székhelye volt.` },

  { name: "Mária Mennybemenetelének temploma", lat: 48.458391195417036, lon: 18.896812945604324, desc:
`Az eredetileg háromhajós románkori templom a 13. században épült, majd több átépítésen ment keresztül. Az 1806-os tűzvész utáni felújításkor klasszicista arculatot kapott.` },

  { name: "Joerges-ház", lat: 48.46036849734661, lon: 18.892219136863364, desc:
`Egyemeletes reneszánsz ház a 16. század első feléből. A 20. század elejétől könyvnyomda működött benne Joerges Ágost vezetésével.` },

  { name: "Glanzenberg tárna", lat: 48.457489, lon: 18.899254, desc:
`Az Adit Glanzenberg Selmecbánya egyik legrégebbi fennmaradt bányatárnája, amelynek eredete a 13. századig nyúlik vissza. A tárna autentikus, nyers élményt ad: szűk járatok, természetes sötétség, minimális modern beavatkozás.` }
];

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function buildPopupHtml(idx, poi){
  const title = `${idx}. ${poi.name}`;
  const desc = (poi.desc || "").trim();
  const descHtml = desc ? `<p class="pop-desc">${escapeHtml(desc)}</p>` : `<p class="pop-desc">Nincs leírás a GPX-ben.</p>`;
  return `<div>
    <div class="pop-title">${escapeHtml(title)}</div>
    ${descHtml}
  </div>`;
}

const MARKER_SHADOW = "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png";
const IMG_GREEN = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png";
const IMG_BLUE  = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png";
const IMG_RED   = "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png";

const iconCache = new Map();
function numberedIcon(color, n){
  const key = color + "_" + String(n);
  if (iconCache.has(key)) return iconCache.get(key);

  const base = (color === "blue") ? IMG_BLUE : IMG_GREEN;

  const html =
    '<div style="position:relative;width:25px;height:41px;">' +
      '<img src="' + base + '" style="width:25px;height:41px;display:block;" />' +
      '<div style="position:absolute;left:0;top:3px;width:25px;height:26px;display:flex;align-items:center;justify-content:center;">' +
        '<span style="display:inline-block;min-width:18px;padding:1px 5px;border-radius:999px;' +
        'background:rgba(255,255,255,0.90);color:#111;font-weight:900;font-size:12px;' +
        'line-height:16px;text-align:center;border:1px solid rgba(0,0,0,0.18);' +
        'box-shadow:0 1px 2px rgba(0,0,0,0.25);">' + String(n) + '</span>' +
      '</div>' +
    '</div>';

  const ic = L.divIcon({
    className: "",
    html,
    iconSize:[25,41],
    iconAnchor:[12,41],
    popupAnchor:[1,-34]
  });

  iconCache.set(key, ic);
  return ic;
}

const userIcon = L.icon({
  iconUrl: IMG_RED,
  shadowUrl: MARKER_SHADOW,
  iconSize:[25,41],
  iconAnchor:[12,41],
  popupAnchor:[1,-34],
  shadowSize:[41,41]
});

const map = L.map("map", { doubleClickZoom:false });
map.doubleClickZoom.disable();

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "OpenStreetMap"
}).addTo(map);

const poiMarkers = new Map();
let selectedIdx = null;
let userMarker = null;
let watchId = null;

function fitAll(){
  const b = [];
  for (let i=0;i<POIS.length;i++){
    const p = POIS[i];
    b.push([p.lat, p.lon]);
  }
  if (b.length) map.fitBounds(b, { padding:[30,30] });
}

function setSelected(newIdx){
  selectedIdx = newIdx;

  document.querySelectorAll(".poi-item").forEach(el => {
    const idx = Number(el.getAttribute("data-idx") || "0");
    el.classList.toggle("selected", idx === selectedIdx);
  });

  for (const [idx, m] of poiMarkers.entries()){
    m.setIcon(numberedIcon(idx === selectedIdx ? "blue" : "green", idx));
    m.setZIndexOffset(idx === selectedIdx ? 800 : 0);
  }
}

function goToPoi(idx, zoom = 17){
  const poi = POIS[idx-1];
  if (!poi) return;

  setSelected(idx);

  map.setView([poi.lat, poi.lon], Math.max(map.getZoom(), zoom), { animate:true });

  const m = poiMarkers.get(idx);
  if (m) m.openPopup();
}

for (let i=0;i<POIS.length;i++){
  const idx = i+1;
  const p = POIS[i];

  const m = L.marker([p.lat, p.lon], { icon: numberedIcon("green", idx) }).addTo(map);
  m.bindPopup(buildPopupHtml(idx, p), { maxWidth: 320 });

  m.on("click", () => {
    goToPoi(idx, 17);
  });

  poiMarkers.set(idx, m);
}

fitAll();

const listEl = document.getElementById("poiList");
for (let i=0;i<POIS.length;i++){
  const idx = i+1;
  const p = POIS[i];

  const row = document.createElement("div");
  row.className = "poi-item";
  row.setAttribute("data-idx", String(idx));

  const left = document.createElement("div");
  left.className = "poi-left";

  const badge = document.createElement("div");
  badge.className = "badge";
  badge.textContent = String(idx);

  const name = document.createElement("div");
  name.className = "poi-name";
  name.textContent = p.name;

  left.appendChild(badge);
  left.appendChild(name);

  row.appendChild(left);

  row.addEventListener("click", () => {
    goToPoi(idx, 17);
  });

  listEl.appendChild(row);
}

const statusChip = document.getElementById("statusChip");

function setGpsStatus(txt){
  if (statusChip) statusChip.textContent = txt;
}

function startGps(){
  if (!("geolocation" in navigator)){
    setGpsStatus("GPS: nem támogatott");
    return;
  }

  try{
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        setGpsStatus("GPS: aktív");

        if (!userMarker){
          userMarker = L.marker([lat, lon], { icon: userIcon }).addTo(map);
          userMarker.bindPopup("Itt vagyok");
        }else{
          userMarker.setLatLng([lat, lon]);
        }
      },
      () => {
        setGpsStatus("GPS: nincs engedély");
      },
      { enableHighAccuracy:true, maximumAge:5000, timeout:10000 }
    );
  }catch{
    setGpsStatus("GPS: hiba");
  }
}

startGps();

document.getElementById("btnMyPos")?.addEventListener("click", () => {
  const ll = userMarker?.getLatLng();
  if (!ll) return;
  map.setView([ll.lat, ll.lng], Math.max(map.getZoom(), 16), { animate:true });
  userMarker.openPopup();
});

/* MapDock: csak a nyíl gomb kapcsol */
(function initMapDock(){
  const dock = document.getElementById("mapDock");
  const btn = document.getElementById("mapDockToggle");
  if (!dock || !btn) return;

  const KEY = "mapDockOpen_selmec_latnivalok";

  const wantOpenDefault = window.matchMedia("(min-width: 900px)").matches;
  let isOpen = wantOpenDefault;

  try{
    const raw = localStorage.getItem(KEY);
    if (raw === "1") isOpen = true;
    if (raw === "0") isOpen = false;
  }catch{}

  function apply(open){
    dock.classList.toggle("open", open);
    btn.textContent = open ? "▼" : "▲";
    btn.setAttribute("aria-expanded", open ? "true" : "false");
    try{ localStorage.setItem(KEY, open ? "1" : "0"); }catch{}
    invalidateMapBurst();
  }

  function toggle(e){
    if (e && typeof e.preventDefault === "function") e.preventDefault();
    isOpen = !dock.classList.contains("open");
    apply(isOpen);
  }

  apply(isOpen);

  btn.addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();
    toggle(e);
  }, { passive:false });

  btn.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " "){
      e.preventDefault();
      toggle(e);
    }
  });

  dock.addEventListener("transitionend", () => invalidateMapBurst());
})();

let __invalidateTimer = null;
function invalidateMapBurst(){
  if (!map) return;

  const fire = (ms) => setTimeout(() => { try{ map.invalidateSize(); }catch{} }, ms);

  fire(0);
  fire(120);
  fire(260);
  fire(520);

  if (__invalidateTimer) clearTimeout(__invalidateTimer);
  __invalidateTimer = setTimeout(() => { try{ map.invalidateSize(); }catch{} }, 900);
}

window.addEventListener("resize", () => {
  if (!map) return;
  requestAnimationFrame(() => {
    try { map.invalidateSize(); } catch {}
  });
});

window.addEventListener("load", () => {
  if (!map) return;
  setTimeout(() => { try { map.invalidateSize(); } catch {} }, 120);
  setTimeout(() => { try { map.invalidateSize(); } catch {} }, 420);
});

invalidateMapBurst();
</script>
